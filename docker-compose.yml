version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    # 端口映射仅在 docker-compose.prod.yml 中定义（127.0.0.1 仅本机访问，供 Nginx 反代）。
    # 此处若再声明会与 prod 叠加，导致 8000 端口被重复绑定、容器起不来（502）。
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/content_studio.db
      - PYTHONPATH=/app
    env_file:
      - .env
    volumes:
      - ./backend:/app/backend  # 卷映射：代码修改后立即生效
      - ./data:/app/data      # 卷映射：数据库持久化
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - NEXT_PUBLIC_API_URL=http://douyin.hapaxtrace.com
    # 端口映射仅在 docker-compose.prod.yml 中定义（127.0.0.1:3001 仅本机访问，供 Nginx 反代）。
    environment:
      - NEXT_PUBLIC_API_URL=http://douyin.hapaxtrace.com
      - NODE_ENV=production
    env_file:
      - .env
    depends_on:
      - backend
    restart: unless-stopped
