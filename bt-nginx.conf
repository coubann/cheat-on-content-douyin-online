# =====================================================
# 宝塔 Nginx 配置 — 用于 douyin.hapaxtrace.com
# 使用方法：宝塔面板 → 网站 → 添加站点
#   - 域名: douyin.hapaxtrace.com
#   - 部署后：将此配置粘贴到 "配置文件" 中
# =====================================================

server {
    listen 80;
    server_name douyin.hapaxtrace.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name douyin.hapaxtrace.com;

    # ── SSL（宝塔会自动管理证书，这里填你的证书路径）──
    ssl_certificate    /www/server/panel/vhost/cert/douyin.hapaxtrace.com/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/douyin.hapaxtrace.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE:ECDH:AES:HIGH:!NULL:!aNULL:!MD5:!ADH:!RC4;

    # ── 上传大小限制（LLM 调用可能需要大请求体）──
    client_max_body_size 20m;

    # ── 前端（Next.js）──
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # SSE 不需要缓存
        proxy_buffering off;
        proxy_cache off;
    }

    # ── 后端 API（FastAPI）──
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # 长时间运行的 API 不超时（预测、bump、SSE 等）
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;

        # SSE 流式响应
        proxy_buffering off;
        proxy_cache off;
    }

    # ── FastAPI docs（可选）──
    location /docs {
        proxy_pass http://127.0.0.1:8000/docs;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:8000/openapi.json;
        proxy_set_header Host $host;
    }

    # ── 静态资源缓存 ──
    location /_next/static {
        proxy_pass http://127.0.0.1:3001;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # ── 日志（宝塔会自动管理）──
    access_log /www/wwwlogs/douyin.hapaxtrace.com.log;
    error_log /www/wwwlogs/douyin.hapaxtrace.com.error.log;
}
